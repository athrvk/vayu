<!doctype html>
<html lang="en">
	<head>
		<meta charset="UTF-8" />
		<link rel="icon" type="image/svg+xml" href="/vite.svg" />
		<meta name="viewport" content="width=device-width, initial-scale=1.0" />
		<title>Vayu</title>
		<!--
			Pre-paint appearance: apply the persisted accent, light/dark, UI font,
			and interface scale before React mounts, so the first frame isn't a
			flash of the wrong theme/size. Keys and font stacks mirror
			src/constants/storage-keys.ts + src/constants/appearance.ts; the
			useElectronTheme / useAppearance hooks remain the source of truth.
		-->
		<script>
			(function () {
				try {
					var el = document.documentElement;
					var scheme = localStorage.getItem("vayu-color-scheme");
					if (scheme) el.setAttribute("data-color-scheme", scheme);
					var source = localStorage.getItem("vayu-theme-source");
					var dark =
						source === "dark" ||
						((source === "system" || !source) &&
							window.matchMedia("(prefers-color-scheme: dark)").matches);
					if (dark) el.classList.add("dark");

					var fonts = {
						system: 'system-ui, -apple-system, "Segoe UI", Roboto, sans-serif',
						mono: '"JetBrains Mono", "Consolas", "Monaco", monospace',
					};
					var font = localStorage.getItem("vayu-ui-font");
					if (fonts[font]) el.style.setProperty("--font-sans", fonts[font]);

					var scales = { compact: 0.9, comfortable: 1.1 };
					var factor = scales[localStorage.getItem("vayu-ui-scale")];
					if (factor) {
						if (window.electronAPI && window.electronAPI.setZoomFactor) {
							window.electronAPI.setZoomFactor(factor);
						} else {
							el.style.zoom = String(factor);
						}
					}
				} catch (e) {
					/* localStorage unavailable — the hooks apply on mount */
				}
			})();
		</script>
		<link rel="preconnect" href="https://fonts.googleapis.com" />
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
		<link
			href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=JetBrains+Mono:ital,wght@0,400;0,500;0,600;1,400&display=swap"
			rel="stylesheet"
		/>
	</head>
	<body>
		<div id="root"></div>
		<script type="module" src="/src/main.tsx"></script>
	</body>
</html>

name: PR CI — run tests

on:
  pull_request:
    branches:
      - master

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            preset: linux-prod
          - os: windows-latest
            preset: windows-prod
          - os: macos-latest
            preset: macos-prod
    timeout-minutes: 60
    env:
      VCPKG_COMMIT: 'bb1ad44ed8d7cfb77d180cdc1585f8b87c2c7428'
      VCPKG_BINARY_SOURCES: 'clear;files,${{ github.workspace }}/.vcpkg-archives,readwrite'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            build-essential \
            pkg-config \
            ca-certificates \
            shellcheck

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: |
          command -v ninja || brew install ninja
          brew install shellcheck

      - name: Lint and test installer script
        if: runner.os != 'Windows'
        shell: bash
        run: |
          shellcheck install.sh
          bash scripts/test/install_test.sh

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Cache vcpkg compiled packages
        uses: actions/cache@v5
        with:
          path: ${{ github.workspace }}/.vcpkg-archives
          key: vcpkg-${{ runner.os }}-${{ hashFiles('engine/vcpkg.json') }}-${{ env.VCPKG_COMMIT }}
          restore-keys: |
            vcpkg-${{ runner.os }}-${{ hashFiles('engine/vcpkg.json') }}-
            vcpkg-${{ runner.os }}-

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: '${{ env.VCPKG_COMMIT }}'
          vcpkgJsonGlob: 'engine/vcpkg.json'

      - name: Build and run engine tests
        uses: lukka/run-cmake@v10
        with:
          cmakeListsTxtPath: '${{ github.workspace }}/engine/CMakeLists.txt'
          configurePreset: ${{ matrix.preset }}
          buildPreset: ${{ matrix.preset }}
          testPreset: ${{ matrix.preset }}
          configurePresetAdditionalArgs: "['-DVAYU_BUILD_TESTS=ON']"

      - name: Install frontend dependencies
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: Type-check frontend
        working-directory: app
        run: pnpm type-check

      - name: Run frontend tests
        working-directory: app
        run: pnpm test

name: PR CI — run tests

on:
  pull_request:
    branches:
      - master

jobs:
  test:
    name: Test on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    permissions:
      contents: read
      packages: write
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
        include:
          - os: ubuntu-latest
            preset: linux-prod
          - os: windows-latest
            preset: windows-prod
          - os: macos-latest
            preset: macos-prod
    timeout-minutes: 60
    env:
      VCPKG_BINARY_SOURCES: 'clear;nuget,https://nuget.pkg.github.com/${{ github.repository_owner }}/index.json,readwrite'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 1

      - name: Install system dependencies (Linux)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends \
            ninja-build \
            build-essential \
            pkg-config \
            ca-certificates \
            shellcheck

      - name: Install system dependencies (macOS)
        if: runner.os == 'macOS'
        run: brew install ninja shellcheck

      - name: Lint and test installer script
        if: runner.os != 'Windows'
        shell: bash
        run: |
          shellcheck install.sh
          bash scripts/test/install_test.sh

      - name: Setup pnpm
        uses: pnpm/action-setup@v6
        with:
          version: 10

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: app/pnpm-lock.yaml

      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        with:
          vcpkgDirectory: '${{ github.workspace }}/vcpkg'
          vcpkgGitCommitId: 'bb1ad44ed8d7cfb77d180cdc1585f8b87c2c7428'
          vcpkgJsonGlob: 'engine/vcpkg.json'

      - name: Build and test engine
        uses: lukka/run-cmake@v10
        with:
          cmakeListsTxtPath: '${{ github.workspace }}/engine/CMakeLists.txt'
          configurePreset: ${{ matrix.preset }}
          buildPreset: ${{ matrix.preset }}
          configurePresetAdditionalArgs: "['-DVAYU_BUILD_TESTS=ON']"

      - name: Run engine tests
        working-directory: engine
        run: ctest --preset ${{ matrix.preset }} --output-on-failure

      - name: Install frontend dependencies
        working-directory: app
        run: pnpm install --frozen-lockfile

      - name: Type-check frontend
        working-directory: app
        run: pnpm type-check

      - name: Run frontend tests
        working-directory: app
        run: pnpm test
